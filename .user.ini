; cPanel-generated php ini directives, do not edit
; Manual editing of this file may result in unexpected behavior.
; To make changes to this file, use the cPanel MultiPHP INI Editor (Home >> Software >> MultiPHP INI Editor)
; For more information, read our documentation (https://go.cpanel.net/EA4ModifyINI)

; ════════════════════════════════════════════════════════
;  HIGH TRAFFIC OPTIMIZATIONS — PHP_INI_ALL / PERDIR
; ════════════════════════════════════════════════════════

; ── Memory & Execution ────────────────────────────────
memory_limit=256M
max_execution_time=30
max_input_time=30
max_input_vars=1000

; ── Output buffering & compression ────────────────────
output_buffering=4096
zlib.output_compression=On
zlib.output_compression_level=5

; ── OPcache (per-dir overrides) ───────────────────────
opcache.enable=1
opcache.revalidate_freq=120
opcache.validate_timestamps=1

; ── Session optimization ──────────────────────────────
; GC dihandle cron, bukan per-request (kurangi overhead)
session.gc_probability=0
session.gc_divisor=1000
session.gc_maxlifetime=1440
session.use_strict_mode=1
session.use_only_cookies=1
session.cookie_httponly=1
session.cookie_secure=1
session.cookie_samesite=Strict
session.sid_length=48
session.cache_limiter=private_no_expire
session.cache_expire=30

; ── Upload (disesuaikan kebutuhan) ────────────────────
upload_max_filesize=16M
post_max_size=20M

; ── Error handling (production) ───────────────────────
display_errors=Off
display_startup_errors=Off
log_errors=On
error_reporting=E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Misc ──────────────────────────────────────────────
default_socket_timeout=10
serialize_precision=-1
expose_php=Off
