; cPanel-generated php ini directives, do not edit
; Manual editing of this file may result in unexpected behavior.
; To make changes to this file, use the cPanel MultiPHP INI Editor (Home >> Software >> MultiPHP INI Editor)
; For more information, read our documentation (https://go.cpanel.net/EA4ModifyINI)

; ════════════════════════════════════════════════════════
;  HIGH TRAFFIC OPTIMIZATIONS — PHP_INI_SYSTEM settings
;  (must live in php.ini, not .user.ini)
; ════════════════════════════════════════════════════════

; ── APCu (user-data cache) ─────────────────────────────
apc.enabled=1
apc.shm_size=64M
apc.ttl=7200
apc.user_ttl=7200
apc.gc_ttl=3600
apc.slam_defense=1
apc.use_request_time=0

; ── OPcache (bytecode cache) ──────────────────────────
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=10000
opcache.max_wasted_percentage=5
opcache.validate_timestamps=1
opcache.revalidate_freq=120
opcache.enable_file_override=1

; ── Shared hosting safety ─────────────────────────────
; JIT dan huge pages sering tidak berguna di cPanel shared host.
opcache.jit=off
opcache.jit_buffer_size=0

; ── Realpath cache ────────────────────────────────────
realpath_cache_size=4096K
realpath_cache_ttl=600
